<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroNest 🧠 Easy Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:Nunito, sans-serif;}
.fade{animation:fade .3s ease;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.pop{animation:pop .2s ease;}
@keyframes pop{0%{transform:scale(.9)}100%{transform:scale(1)}}
</style>
</head>

<body class="bg-gradient-to-br from-indigo-100 to-pink-100">
<div id="app" class="min-h-screen"></div>

<script>
const app = document.getElementById("app");

/* ---------- GLOBAL STATE ---------- */
let state = {
  user: localStorage.getItem("neuronest_user") || null,
  stars: Number(localStorage.getItem("stars")) || 0,
  level: Number(localStorage.getItem("level")) || 1
};

/* ---------- UTILS ---------- */
function save(){
  localStorage.setItem("neuronest_user",state.user);
  localStorage.setItem("stars",state.stars);
  localStorage.setItem("level",state.level);
}

/* ---------- LOGIN ---------- */
function renderLogin(){
app.innerHTML = `
<div class="min-h-screen flex items-center justify-center fade">
<div class="bg-white p-8 rounded-2xl shadow-xl w-80 text-center">
<h1 class="text-4xl font-black text-indigo-700 mb-4">NeuroNest 🧠</h1>
<p class="mb-4 text-gray-500">Enter your name to start</p>
<input id="name" placeholder="Your Name" class="border p-3 rounded-xl w-full mb-4"/>
<button onclick="login()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl pop">Start Learning</button>
</div>
</div>`;
}

function login(){
 const name = document.getElementById("name").value.trim();
 if(name.length<2){ alert("Enter valid name"); return; }
 state.user = name;
 save();
 renderDashboard();
}

function logout(){
 localStorage.clear();
 state={user:null,stars:0,level:1};
 renderLogin();
}

/* ---------- DASHBOARD ---------- */
function renderDashboard(){
app.innerHTML = `
<div class="p-4 fade max-w-md mx-auto">
<div class="bg-white p-4 rounded-xl shadow flex justify-between items-center">
<span class="font-bold">Hi ${state.user} 👋</span>
<button onclick="logout()" class="text-red-500 font-bold">Logout</button>
</div>

<div class="flex justify-between mt-3 bg-white p-3 rounded-xl shadow text-sm">
<span>⭐ ${state.stars}</span>
<span>Level ${state.level}</span>
</div>

<h2 class="text-2xl font-black mt-4 mb-3">Games</h2>

<div class="grid grid-cols-2 gap-3">
<div onclick="mathGame()" class="bg-green-200 p-5 rounded-xl text-center font-bold cursor-pointer pop">Math</div>
<div onclick="memoryGame()" class="bg-purple-200 p-5 rounded-xl text-center font-bold cursor-pointer pop">Memory</div>
<div onclick="alphabetGame()" class="bg-yellow-200 p-5 rounded-xl text-center font-bold cursor-pointer pop">Alphabet</div>
<div onclick="colorGame()" class="bg-red-200 p-5 rounded-xl text-center font-bold cursor-pointer pop">Colors</div>
</div>

<h2 class="text-2xl font-black mt-5 mb-3">More</h2>
<div class="grid grid-cols-2 gap-3">
<div onclick="renderParent()" class="bg-blue-200 p-4 rounded-xl text-center font-bold cursor-pointer">Parent Mode</div>
<div onclick="renderLeaderboard()" class="bg-orange-200 p-4 rounded-xl text-center font-bold cursor-pointer">Leaderboard</div>
</div>
</div>`;
}

/* ---------- REWARD ---------- */
function reward(points){
 state.stars += points;
 if(state.stars % 50 === 0) state.level++;
 save();
}

/* ---------- GAMES ---------- */

/* Math */
function mathGame(){
 const a = state.level + 1;
 const b = state.level;
 app.innerHTML = `
<div class="min-h-screen flex flex-col items-center justify-center fade">
<h1 class="text-5xl font-black mb-4">${a} + ${b} = ?</h1>
<input id="ans" class="border p-3 rounded-xl mb-4"/>
<button onclick="checkMath(${a+b})" class="bg-indigo-600 text-white font-bold py-3 px-6 rounded-xl">Submit</button>
</div>`;
}
function checkMath(correct){
 const val = Number(document.getElementById("ans").value);
 if(val===correct){
   reward(10);
   alert("Correct! ⭐ +10");
 }
 renderDashboard();
}

/* Memory */
function memoryGame(){
 const num = Math.floor(Math.random()*900)+100;
 app.innerHTML = `
<div class="min-h-screen flex flex-col items-center justify-center fade">
<h1 class="text-6xl font-black mb-4">${num}</h1>
<p class="mb-4">Remember this number</p>
<button onclick="reward(15);renderDashboard()" class="bg-indigo-600 text-white font-bold py-3 px-6 rounded-xl">Next</button>
</div>`;
}

/* Alphabet */
function alphabetGame(){
 const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
 const target = letters[state.level%26];
 const options = letters.slice(0,6).split('').sort(()=>0.5-Math.random());
 app.innerHTML=`
<div class="min-h-screen flex flex-col items-center justify-center fade">
<h2 class="text-3xl font-black mb-4">Click ${target}</h2>
<div class="flex gap-4 text-4xl font-bold">
${options.map(l=>`<span onclick="alphaCheck('${l}','${target}')" class="cursor-pointer">${l}</span>`).join("")}
</div>
</div>`;
}
function alphaCheck(l,t){
 if(l===t){ reward(10); alert("Correct ⭐"); }
 renderDashboard();
}

/* Colors */
function colorGame(){
 const colors=[{n:"Red",c:"red"},{n:"Blue",c:"blue"},{n:"Green",c:"green"}];
 const t=colors[state.level%3];
 app.innerHTML=`
<div class="min-h-screen flex flex-col items-center justify-center fade">
<h2 class="text-3xl font-black mb-4">Click ${t.n}</h2>
<div class="flex gap-4">
${colors.map(col=>`
<div onclick="colorCheck('${col.n}','${t.n}')" 
style="background:${col.c}" 
class="w-20 h-20 rounded-xl cursor-pointer"></div>`).join("")}
</div>
</div>`;
}
function colorCheck(c,t){
 if(c===t){ reward(10); alert("Correct ⭐"); }
 renderDashboard();
}

/* ---------- PARENT MODE ---------- */
function renderParent(){
app.innerHTML=`
<div class="p-6 fade max-w-md mx-auto">
<h2 class="text-3xl font-black mb-4">Parent Dashboard</h2>
<p><b>Child:</b> ${state.user}</p>
<p><b>Stars:</b> ${state.stars}</p>
<p><b>Level:</b> ${state.level}</p>
<p class="mt-3 text-gray-600">Progress tracking enabled</p>
<button onclick="renderDashboard()" class="mt-4 bg-indigo-600 text-white font-bold py-3 px-6 rounded-xl">Back</button>
</div>`;
}

/* ---------- LEADERBOARD ---------- */
function renderLeaderboard(){
app.innerHTML=`
<div class="p-6 fade max-w-md mx-auto">
<h2 class="text-3xl font-black mb-4">Leaderboard</h2>
<ol class="list-decimal ml-6">
<li>Kid Alpha - 500⭐</li>
<li>Kid Beta - 420⭐</li>
<li>${state.user} - ${state.stars}⭐</li>
</ol>
<button onclick="renderDashboard()" class="mt-4 bg-indigo-600 text-white font-bold py-3 px-6 rounded-xl">Back</button>
</div>`;
}

/* ---------- INIT ---------- */
if(state.user){
 renderDashboard();
}else{
 renderLogin();
}
</script>
</body>
</html>
