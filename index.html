<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroNest - Kids Learning Platform</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { font-family: sans-serif; }
</style>
</head>

<body class="bg-slate-100">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

/* ---------------- BUTTON ---------------- */

const Button = ({children,onClick,className=''})=>(
<button
onClick={onClick}
className={`px-6 py-3 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 active:scale-95 transition ${className}`}
>
{children}
</button>
);

/* ---------------- APP ---------------- */

function App(){

const [screen,setScreen]=useState('welcome');
const [name,setName]=useState('');
const [age,setAge]=useState(null);
const [stars,setStars]=useState(0);

const reward=(points)=>{
setStars(s=>s+points);
setScreen('reward');
};

/* ---------------- SCREENS ---------------- */

if(screen==='welcome'){
return(
<div className="min-h-screen flex flex-col items-center justify-center text-center">
<h1 className="text-4xl font-black mb-4">Welcome to NeuroNest 🧠</h1>
<p className="mb-8">Digital playground for smart kids</p>
<Button onClick={()=>setScreen('login')}>Let's Play</Button>
<Button className="mt-4 bg-gray-600" onClick={()=>setScreen('parent')}>Parent Mode</Button>
</div>
);
}

if(screen==='login'){
return(
<div className="min-h-screen flex flex-col items-center justify-center">
<h2 className="text-2xl font-bold mb-6">Login</h2>
<input className="border p-3 rounded-xl mb-4 w-64" placeholder="Email"/>
<input className="border p-3 rounded-xl mb-4 w-64" type="password" placeholder="Password"/>
<Button onClick={()=>setScreen('name')}>Login</Button>
</div>
);
}

if(screen==='name'){
return(
<div className="min-h-screen flex flex-col items-center justify-center">
<h2 className="text-2xl font-bold mb-6">What's your name?</h2>
<input className="border p-3 rounded-xl mb-4 w-64"
value={name}
onChange={(e)=>setName(e.target.value)}
/>
<Button onClick={()=>setScreen('age')}>Next</Button>
</div>
);
}

if(screen==='age'){
return(
<div className="min-h-screen flex flex-col items-center justify-center">
<h2 className="text-2xl font-bold mb-6">Select your age</h2>
<div className="flex gap-4 mb-6">
{[3,4,5,6,7,8].map(num=>(
<button
key={num}
onClick={()=>setAge(num)}
className={`px-6 py-3 rounded-xl border ${age===num?'bg-indigo-600 text-white':''}`}
>
{num}
</button>
))}
</div>
<Button onClick={()=>setScreen('dashboard')}>Next</Button>
</div>
);
}

if(screen==='dashboard'){
return(
<div className="p-8">
<h2 className="text-2xl font-black mb-2">Hi {name} 👋</h2>
<p className="mb-6">Age: {age} | Stars ⭐ {stars}</p>

<div className="grid grid-cols-2 md:grid-cols-4 gap-6">
{[
['Math','math'],
['Alphabet','alphabet'],
['Memory','memory'],
['Colors','colors'],
['Numbers','numbers'],
['Animals','animals'],
['Shapes','shapes'],
['Words','words']
].map(([title,key])=>(
<div key={key}
onClick={()=>setScreen(key)}
className="bg-indigo-100 p-6 rounded-2xl text-center font-bold cursor-pointer hover:scale-105 transition">
{title}
</div>
))}
</div>

<div className="mt-8">
<Button onClick={()=>setScreen('welcome')} className="bg-gray-500">Home</Button>
</div>
</div>
);
}

/* ---------------- EDUCATIONAL GAMES ---------------- */

const GameLayout=({title,children})=>(
<div className="min-h-screen flex flex-col items-center justify-center text-center">
<h2 className="text-2xl font-bold mb-6">{title}</h2>
{children}
<Button className="mt-6 bg-gray-600" onClick={()=>setScreen('dashboard')}>Back</Button>
</div>
);

if(screen==='math'){
const [ans,setAns]=useState('');
return(
<GameLayout title="2 + 3 = ?">
<input className="border p-3 rounded-xl mb-4"
value={ans}
onChange={(e)=>setAns(e.target.value)}
/>
<Button onClick={()=>ans==5 && reward(10)}>Submit</Button>
</GameLayout>
);
}

if(screen==='alphabet'){
return(
<GameLayout title="Click A">
<div className="flex gap-6 text-4xl font-bold">
<span onClick={()=>reward(10)} className="cursor-pointer">A</span>
<span>B</span>
<span>C</span>
</div>
</GameLayout>
);
}

if(screen==='memory'){
const [show,setShow]=useState(true);
useEffect(()=>{setTimeout(()=>setShow(false),2000)},[]);
return(
<GameLayout title="Remember 8">
{show?<h1 className="text-6xl font-bold">8</h1>:<Button onClick={()=>reward(15)}>It was 8</Button>}
</GameLayout>
);
}

if(screen==='colors'){
return(
<GameLayout title="Click Red">
<div className="flex gap-4">
<div onClick={()=>reward(10)} className="w-16 h-16 bg-red-500 rounded-xl"></div>
<div className="w-16 h-16 bg-blue-500 rounded-xl"></div>
</div>
</GameLayout>
);
}

if(screen==='numbers'){
return(
<GameLayout title="Smallest Number?">
<div className="flex gap-6 text-3xl">
<span onClick={()=>reward(10)}>1</span>
<span>5</span>
<span>9</span>
</div>
</GameLayout>
);
}

if(screen==='animals'){
return(
<GameLayout title="Who says Meow?">
<Button onClick={()=>reward(10)}>Cat</Button>
<Button>Dog</Button>
</GameLayout>
);
}

if(screen==='shapes'){
return(
<GameLayout title="Click Circle">
<div className="flex gap-6">
<div onClick={()=>reward(10)} className="w-16 h-16 bg-indigo-500 rounded-full"></div>
<div className="w-16 h-16 bg-indigo-500"></div>
</div>
</GameLayout>
);
}

if(screen==='words'){
return(
<GameLayout title="Spell CAT">
<Button onClick={()=>reward(15)}>C A T</Button>
</GameLayout>
);
}

/* ---------------- REWARD ---------------- */

if(screen==='reward'){
return(
<div className="min-h-screen flex flex-col items-center justify-center text-center">
<h2 className="text-3xl font-black mb-6">Great Job! ⭐</h2>
<p className="mb-6">Total Stars: {stars}</p>
<Button onClick={()=>setScreen('dashboard')}>Back to Dashboard</Button>
</div>
);
}

if(screen==='parent'){
return(
<div className="min-h-screen flex flex-col items-center justify-center text-center">
<h2 className="text-3xl font-black mb-6">Parent Dashboard</h2>
<p>Total Stars Earned: {stars}</p>
<Button className="mt-6" onClick={()=>setScreen('welcome')}>Back</Button>
</div>
);
}

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
