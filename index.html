<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroNest - Smart Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap');
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background: #f0f4f8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Responsive Container */
        .app-shell {
            width: 100%;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Desktop View (Screen > 768px) */
        @media (min-width: 768px) {
            body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            .app-shell {
                width: 420px;
                height: 850px;
                border-radius: 40px;
                box-shadow: 0 40px 100px rgba(0,0,0,0.4);
                border: 8px solid #1a202c;
            }
        }

        .breathe-circle { animation: breathe 4s ease-in-out infinite; }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.4); opacity: 1; }
        }

        .tap-scale:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const Button = ({ children, onClick, variant = 'primary', className = "" }) => {
            const styles = {
                primary: 'bg-indigo-600 text-white shadow-lg active:bg-indigo-700',
                outline: 'border-2 border-indigo-200 text-indigo-600 hover:bg-indigo-50',
                game: 'bg-white text-indigo-600 shadow-md hover:shadow-xl'
            };
            return (
                <button onClick={onClick} className={`px-6 py-4 rounded-2xl font-black text-lg transition-all tap-scale flex items-center justify-center gap-3 ${styles[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        function App() {
            const [screen, setScreen] = useState('splash');
            const [stars, setStars] = useState(150);

            useEffect(() => {
                if (screen === 'splash') setTimeout(() => setScreen('welcome'), 2000);
            }, [screen]);

            const renderScreen = () => {
                switch(screen) {
                    case 'splash': return (
                        <div className="flex-1 flex flex-col items-center justify-center bg-indigo-600 text-white">
                            <Icon name="brain" className="w-24 h-24 mb-4 animate-bounce" />
                            <h1 className="text-4xl font-black italic tracking-tighter">NeuroNest</h1>
                        </div>
                    );
                    case 'welcome': return (
                        <div className="flex-1 flex flex-col p-10 justify-between">
                            <div className="text-center">
                                <div className="w-20 h-20 bg-indigo-100 rounded-3xl flex items-center justify-center mx-auto mb-6">
                                    <Icon name="sparkles" className="text-indigo-600 w-10 h-10" />
                                </div>
                                <h2 className="text-3xl font-black text-slate-800">Hi Explorer!</h2>
                                <p className="text-slate-500 mt-2 font-semibold">Ready to grow your brain today?</p>
                            </div>
                            <div className="space-y-4">
                                <Button onClick={() => setScreen('dashboard')} className="w-full">Let's Start!</Button>
                                <Button onClick={() => setScreen('parent')} variant="outline" className="w-full">Parent Dashboard</Button>
                            </div>
                        </div>
                    );
                    case 'dashboard': return (
                        <div className="flex-1 flex flex-col bg-slate-50">
                            <div className="bg-white p-6 flex justify-between items-center border-b shadow-sm">
                                <h3 className="font-black text-indigo-600 text-xl">NeuroNest</h3>
                                <div className="bg-amber-100 px-4 py-2 rounded-full flex items-center gap-2 font-black text-amber-700">
                                    <Icon name="star" className="w-5 h-5 fill-amber-500 text-amber-500" /> {stars}
                                </div>
                            </div>
                            <div className="p-6 space-y-4 flex-1 overflow-y-auto">
                                <div onClick={() => setScreen('game-brain')} className="bg-gradient-to-br from-blue-500 to-blue-600 p-6 rounded-[32px] text-white cursor-pointer tap-scale shadow-lg">
                                    <Icon name="puzzle" className="mb-2" />
                                    <h4 className="text-xl font-black">Brain Power</h4>
                                    <p className="opacity-80 font-bold">Memory & Logic</p>
                                </div>
                                <div onClick={() => setScreen('game-focus')} className="bg-gradient-to-br from-teal-500 to-teal-600 p-6 rounded-[32px] text-white cursor-pointer tap-scale shadow-lg">
                                    <Icon name="wind" className="mb-2" />
                                    <h4 className="text-xl font-black">Calm Breath</h4>
                                    <p className="opacity-80 font-bold">Focus & Relax</p>
                                </div>
                                <div className="bg-pink-100 p-6 rounded-[32px] text-pink-400 flex items-center justify-between opacity-60">
                                    <div><h4 className="font-black">Emotion Reader</h4><p className="text-sm font-bold">Coming Soon!</p></div>
                                    <Icon name="lock" />
                                </div>
                            </div>
                        </div>
                    );
                    case 'game-brain': return (
                        <div className="flex-1 bg-white p-8 flex flex-col">
                            <button onClick={() => setScreen('dashboard')}><Icon name="chevron-left" className="text-slate-400" /></button>
                            <div className="flex-1 flex flex-col items-center justify-center text-center">
                                <h2 className="text-2xl font-black mb-10">Match the <span className="text-blue-600">Circle!</span></h2>
                                <div className="grid grid-cols-2 gap-6 w-full">
                                    <div onClick={() => {setStars(s=>s+10); setScreen('dashboard')}} className="bg-blue-600 aspect-square rounded-full shadow-xl tap-scale"></div>
                                    <div className="bg-slate-100 aspect-square rounded-full"></div>
                                    <div className="bg-slate-100 aspect-square rounded-full"></div>
                                    <div className="bg-slate-100 aspect-square rounded-full"></div>
                                </div>
                            </div>
                        </div>
                    );
                    case 'game-focus': return (
                        <div className="flex-1 bg-teal-50 p-8 flex flex-col items-center justify-center">
                            <div className="w-56 h-56 bg-teal-500 rounded-full breathe-circle flex items-center justify-center shadow-2xl mb-16">
                                <Icon name="wind" className="w-20 h-20 text-white" />
                            </div>
                            <h2 className="text-3xl font-black text-teal-900 animate-pulse">Breathe...</h2>
                            <Button onClick={() => setScreen('dashboard')} className="mt-16 w-full bg-teal-600 border-none">I Feel Better</Button>
                        </div>
                    );
                    case 'parent': return (
                        <div className="flex-1 bg-white p-8 flex flex-col overflow-y-auto">
                            <button onClick={() => setScreen('welcome')} className="mb-8 flex items-center gap-2 font-bold text-slate-500"><Icon name="arrow-left" /> Back</button>
                            <h2 className="text-3xl font-black mb-8">Parent Insights</h2>
                            <div className="space-y-6">
                                <div className="bg-slate-50 p-6 rounded-3xl border-2 border-slate-100">
                                    <p className="text-xs font-black text-slate-400 mb-1 tracking-widest">FOCUS TIME</p>
                                    <p className="text-3xl font-black text-slate-800">22 Minutes</p>
                                </div>
                                <div className="bg-indigo-50 p-6 rounded-3xl border-2 border-indigo-100">
                                    <p className="text-xs font-black text-indigo-400 mb-1 tracking-widest">STARS EARNED</p>
                                    <p className="text-3xl font-black text-indigo-700">{stars}</p>
                                </div>
                                <div className="bg-amber-50 p-6 rounded-3xl">
                                    <p className="font-bold text-amber-800 italic">"Buddy is showing great focus in calm breathing tasks today."</p>
                                </div>
                            </div>
                        </div>
                    );
                }
            };

            return (
                <div className="app-shell">
                    {renderScreen()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
