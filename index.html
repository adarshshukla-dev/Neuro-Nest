<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroNest - Kids Learning App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap');
        body { font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-breathe { animation: breathe 4s ease-in-out infinite; }
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Global Components ---
        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
            const variants = {
                primary: 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg active:scale-95',
                secondary: 'bg-pink-500 text-white hover:bg-pink-600 shadow-md',
                outline: 'border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50',
                ghost: 'text-gray-500 hover:bg-gray-100'
            };
            return (
                <button 
                    disabled={disabled}
                    onClick={onClick} 
                    className={`px-6 py-3 rounded-2xl font-bold transition-all duration-200 flex items-center justify-center gap-2 ${variants[variant]} ${disabled ? 'opacity-50' : ''} ${className}`}
                >
                    {children}
                </button>
            );
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-3xl p-6 shadow-sm border border-indigo-50 ${className}`}>{children}</div>
        );

        const Icon = ({ name, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Main App ---
        function App() {
            const [screen, setScreen] = useState('splash');
            const [stars, setStars] = useState(120);
            const [profile, setProfile] = useState({ name: '', age: '', interests: [], learningMode: 'fun' });

            useEffect(() => {
                if (screen === 'splash') setTimeout(() => setScreen('welcome'), 2500);
            }, [screen]);

            const renderScreen = () => {
                switch (screen) {
                    case 'splash': return <SplashScreen />;
                    case 'welcome': return <WelcomeScreen onStart={() => setScreen('profile-setup')} onParent={() => setScreen('parent-mode')} />;
                    case 'profile-setup': return <ProfileSetup profile={profile} setProfile={setProfile} onComplete={() => setScreen('dashboard')} />;
                    case 'dashboard': return <Dashboard stars={stars} onNavigate={setScreen} />;
                    case 'game-brain': return <BrainGame onBack={() => setScreen('dashboard')} onWin={() => { setStars(s => s + 20); setScreen('reward'); }} />;
                    case 'game-emotion': return <EmotionGame onBack={() => setScreen('dashboard')} onComplete={() => { setStars(s => s + 15); setScreen('reward'); }} />;
                    case 'game-focus': return <FocusGame onBack={() => setScreen('dashboard')} onComplete={() => { setStars(s => s + 25); setScreen('reward'); }} />;
                    case 'reward': return <RewardScreen onNext={() => setScreen('dashboard')} />;
                    case 'parent-mode': return <ParentDashboard onBack={() => setScreen('welcome')} />;
                    default: return <WelcomeScreen onStart={() => setScreen('profile-setup')} />;
                }
            };

            return (
                <div className="min-h-screen flex justify-center items-center">
                    <div className="w-full max-w-md h-[100dvh] bg-white shadow-2xl relative overflow-hidden flex flex-col">
                        {renderScreen()}
                    </div>
                </div>
            );
        }

        // --- Screen Components ---

        function SplashScreen() {
            return (
                <div className="flex-1 flex flex-col items-center justify-center bg-gradient-to-br from-indigo-600 to-violet-700 text-white">
                    <div className="w-32 h-32 bg-white rounded-full flex items-center justify-center shadow-2xl mb-6 animate-bounce">
                        <Icon name="brain" className="w-16 h-16 text-indigo-600" />
                    </div>
                    <h1 className="text-4xl font-black italic">NeuroNest</h1>
                </div>
            );
        }

        function WelcomeScreen({ onStart, onParent }) {
            return (
                <div className="flex-1 flex flex-col p-8 justify-between">
                    <div className="mt-12 text-center">
                        <Icon name="brain" className="w-20 h-20 text-indigo-600 mx-auto mb-6" />
                        <h2 className="text-3xl font-black text-slate-900 mb-4">Welcome to NeuroNest</h2>
                        <p className="text-slate-500">The digital playground that grows with your child's brain.</p>
                    </div>
                    <div className="space-y-4 mb-12">
                        <Button onClick={onStart} className="w-full text-lg py-5">Let's Play!</Button>
                        <Button onClick={onParent} variant="outline" className="w-full"><Icon name="settings" /> Parent Mode</Button>
                    </div>
                </div>
            );
        }

        function ProfileSetup({ profile, setProfile, onComplete }) {
            const [step, setStep] = useState(1);
            return (
                <div className="flex-1 p-8 flex flex-col">
                    <h2 className="text-2xl font-black mb-6">{step === 1 ? "What's your name?" : "Select your age"}</h2>
                    {step === 1 ? (
                        <input type="text" className="w-full p-4 rounded-2xl border-2 mb-4 outline-none focus:border-indigo-600" value={profile.name} onChange={(e) => setProfile({...profile, name: e.target.value})} />
                    ) : (
                        <div className="grid grid-cols-3 gap-3">
                            {[3, 4, 5, 6, 7, 8].map(age => (
                                <button key={age} onClick={() => setProfile({...profile, age})} className={`p-4 rounded-2xl border-2 font-bold ${profile.age === age ? 'border-indigo-600 bg-indigo-50' : 'border-slate-100'}`}>{age}</button>
                            ))}
                        </div>
                    )}
                    <Button className="mt-auto" onClick={() => step < 2 ? setStep(2) : onComplete()} disabled={step === 1 && !profile.name}>Next</Button>
                </div>
            );
        }

        function Dashboard({ stars, onNavigate }) {
            return (
                <div className="flex-1 flex flex-col bg-slate-50 overflow-y-auto">
                    <div className="bg-white p-6 border-b flex justify-between items-center sticky top-0 z-10">
                        <h3 className="text-lg font-black">Hi, Buddy!</h3>
                        <div className="bg-amber-100 px-3 py-1.5 rounded-full flex items-center gap-2">
                            <Icon name="star" className="w-5 h-5 text-amber-500 fill-amber-500" />
                            <span className="font-bold text-amber-700">{stars}</span>
                        </div>
                    </div>
                    <div className="p-6 grid grid-cols-2 gap-4">
                        <ModuleCard icon="brain" title="Brain" color="bg-blue-50" onClick={() => onNavigate('game-brain')} />
                        <ModuleCard icon="heart" title="Emotion" color="bg-pink-50" onClick={() => onNavigate('game-emotion')} />
                        <ModuleCard icon="target" title="Focus" color="bg-orange-50" onClick={() => onNavigate('game-focus')} />
                        <ModuleCard icon="lock" title="Social" color="bg-purple-50" locked />
                    </div>
                </div>
            );
        }

        function ModuleCard({ icon, title, color, onClick, locked }) {
            return (
                <button onClick={!locked ? onClick : undefined} className={`${color} rounded-3xl p-6 flex flex-col items-center gap-3 active:scale-95 transition-all`}>
                    <Icon name={icon} className={locked ? "opacity-30" : "text-indigo-600"} />
                    <span className="font-black text-slate-800">{title}</span>
                </button>
            );
        }

        function BrainGame({ onBack, onWin }) {
            return (
                <div className="flex-1 flex flex-col items-center justify-center p-8 text-center bg-white">
                    <h2 className="text-2xl font-black mb-12">Find the <span className="text-blue-600">Blue</span> Circle!</h2>
                    <div className="grid grid-cols-2 gap-4 w-full">
                        <div onClick={onWin} className="bg-blue-500 aspect-square rounded-[40px] cursor-pointer active:scale-90 transition-all"></div>
                        <div className="bg-red-500 aspect-square rounded-[40px]"></div>
                        <div className="bg-green-500 aspect-square rounded-[40px]"></div>
                        <div className="bg-yellow-500 aspect-square rounded-[40px]"></div>
                    </div>
                </div>
            );
        }

        function EmotionGame({ onBack, onComplete }) {
            return (
                <div className="flex-1 p-8 flex flex-col bg-pink-50 text-center">
                    <Card className="mb-8">
                        <div className="text-6xl mb-4">😢</div>
                        <h3 className="text-xl font-bold mb-2">Momo is sad.</h3>
                        <p className="text-slate-600 italic">"I lost my favorite banana..."</p>
                    </Card>
                    <div className="space-y-3">
                        <Button variant="outline" className="w-full bg-white" onClick={onComplete}>Give Momo a hug</Button>
                        <Button variant="outline" className="w-full bg-white" onClick={onComplete}>Help find the banana</Button>
                    </div>
                </div>
            );
        }

        function FocusGame({ onBack, onComplete }) {
            const [inhale, setInhale] = useState(true);
            useEffect(() => {
                const interval = setInterval(() => setInhale(i => !i), 4000);
                return () => clearInterval(interval);
            }, []);
            return (
                <div className="flex-1 flex flex-col items-center justify-center p-8 bg-teal-50">
                    <div className={`w-40 h-40 bg-teal-500 rounded-full mb-12 animate-breathe flex items-center justify-center text-white`}>
                        <Icon name="zap" className="w-12 h-12" />
                    </div>
                    <h2 className="text-2xl font-black text-teal-900 mb-8">{inhale ? 'Inhale...' : 'Exhale...'}</h2>
                    <Button onClick={onComplete}>I'm Calm Now</Button>
                </div>
            );
        }

        function RewardScreen({ onNext }) {
            return (
                <div className="flex-1 flex flex-col items-center justify-center p-8 bg-amber-50">
                    <Icon name="trophy" className="w-32 h-32 text-amber-500 mb-6" />
                    <h2 className="text-3xl font-black mb-2">Awesome!</h2>
                    <p className="mb-8">+20 Energy Stars</p>
                    <Button onClick={onNext} className="w-full">Continue</Button>
                </div>
            );
        }

        function ParentDashboard({ onBack }) {
            return (
                <div className="flex-1 bg-slate-50 p-6 overflow-y-auto">
                    <div className="flex items-center gap-4 mb-6">
                        <button onClick={onBack}><Icon name="arrow-left" /></button>
                        <h2 className="text-xl font-bold">Parent Insights</h2>
                    </div>
                    <div className="grid grid-cols-2 gap-4 mb-6">
                        <div className="bg-indigo-50 p-4 rounded-2xl">
                            <p className="text-xs font-bold text-indigo-400">SCREEN TIME</p>
                            <p className="text-2xl font-black text-indigo-700">18m</p>
                        </div>
                        <div className="bg-pink-50 p-4 rounded-2xl">
                            <p className="text-xs font-bold text-pink-400">HAPPINESS</p>
                            <p className="text-2xl font-black text-pink-700">High</p>
                        </div>
                    </div>
                    <Card className="bg-indigo-600 text-white">
                        <h4 className="font-bold mb-2">Coach Suggestion</h4>
                        <p className="text-sm opacity-90">Your child is doing great with empathy! Try more memory puzzles next.</p>
                    </Card>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
