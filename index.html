<style>
/* ===============================
   ULTRA PRO KIDS GAME THEME
================================ */

body {

}

@keyframes bgMove {

/* ===============================
   GAME WRAPPER
================================ */

}

/* ===============================
   GAME TITLE
================================ */

h1 {

        0 0 20px #ff6bff,

@keyframes floatTitle {

/* ===============================
   GLASS LEVEL CARD
================================ */

.level-card {

.level-card:hover {

/* ===============================

================================ */

/* ===============================
   ANIMAL IMAGE STYLE
================================ */

.animal-img {

================================ */

.score-box {

/* ===============================

================================ */

.popup {

@keyframes popupShow {
    to {

/* ===============================
   FLOATING BUBBLES BACKGROUND
================================ */

body::before {
   
    content:"";

    animation:bubbleMove 40s linear infinite;

@keyframes bubbleMove {
    from {transform:translateY(0);}

<body class="bg-slate-100">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

/* ---------------- BUTTON ---------------- */

const Button = ({children,onClick,className=''})=>(
<button
onClick={onClick}
className={`px-6 py-3 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 active:scale-95 transition ${className}`}
>
{children}
</button>
);

/* ---------------- GAME LAYOUT ---------------- */

const GameLayout=({title,children,onBack})=>(
<div className="min-h-screen flex flex-col items-center justify-center text-center">
<h2 className="text-2xl font-bold mb-6">{title}</h2>
{children}
<Button className="mt-6 bg-gray-600" onClick={onBack}>Back</Button>
</div>
);

/* ---------------- BREATHING GAME ---------------- */

function BreathingGame({onBack,onWin}){

const [inhale,setInhale]=React.useState(true);

React.useEffect(()=>{
const i=setInterval(()=>{
setInhale(v=>!v);
},4000);

return()=>clearInterval(i);
},[]);

return(
<GameLayout title={inhale?'Inhale... 🌬️':'Exhale... 😌'} onBack={onBack}>
<div className="w-40 h-40 bg-teal-500 rounded-full animate-breathe"></div>
<Button className="mt-8" onClick={()=>onWin(15)}>
I Feel Calm 🧘
</Button>
</GameLayout>
);
}

/* ---------------- PUZZLE GAME ---------------- */

/* ---------------- ADVANCED PUZZLE GAME ---------------- */

function PuzzleGame({onBack,onWin}){

const levels = [
{
title:"Level 1 - Find Circle",
items:[
{shape:"circle",correct:true},
{shape:"square"},
{shape:"diamond"}
]
},
{
title:"Level 2 - Find Triangle",
items:[
{shape:"triangle",correct:true},
{shape:"circle"},
{shape:"square"},
{shape:"diamond"}
]
},
{
title:"Level 3 - Find Star ⭐",
items:[
{shape:"star",correct:true},
{shape:"triangle"},
{shape:"circle"},
{shape:"square"},
{shape:"diamond"}
]
},
{
title:"Level 4 - Memory Pattern",
pattern:["circle","square","triangle"]
}
];

const [level,setLevel]=React.useState(0);
const current = levels[level];

function nextLevel(){
if(level < levels.length-1){
setLevel(level+1);
}else{
onWin(25); // all levels completed reward
}
}

/* ---------- SHAPE RENDER ---------- */

const Shape = ({type,onClick})=>{

const base="w-16 h-16 bg-indigo-500 cursor-pointer flex items-center justify-center";

if(type==="circle")
return <div onClick={onClick} className={`${base} rounded-full`}></div>;

if(type==="square")
return <div onClick={onClick} className={`${base}`}></div>;

if(type==="diamond")
return <div onClick={onClick} className={`${base} rotate-45`}></div>;

if(type==="triangle")
return (
<div onClick={onClick}
className="w-0 h-0 border-l-[32px] border-l-transparent border-r-[32px] border-r-transparent border-b-[60px] border-b-indigo-500 cursor-pointer"></div>
);

if(type==="star")
return <div onClick={onClick} className="text-4xl cursor-pointer">⭐</div>;

};

/* ---------- MEMORY LEVEL ---------- */

const [input,setInput]=React.useState([]);

if(current.pattern){

return(
<GameLayout title={current.title} onBack={onBack}>

<p className="mb-4">Repeat Pattern</p>

<div className="flex gap-4 mb-6">
{current.pattern.map((s,i)=>(<Shape key={i} type={s}/>))}
</div>

<div className="flex gap-4">
{["circle","square","triangle"].map((s,i)=>(
<Shape key={i} type={s}
onClick={()=>{
const newInput=[...input,s];
setInput(newInput);

if(newInput.length===current.pattern.length){

if(JSON.stringify(newInput)===JSON.stringify(current.pattern)){
setTimeout(nextLevel,600);
}

setTimeout(()=>setInput([]),800);
}
}}
/>
))}
</div>

</GameLayout>
);
}

/* ---------- NORMAL LEVEL ---------- */

return(
<GameLayout title={current.title} onBack={onBack}>

<div className="flex flex-wrap justify-center gap-6">

{current.items
.sort(()=>0.5-Math.random())
.map((item,i)=>(
<Shape
key={i}
type={item.shape}
onClick={()=>{
if(item.correct){
nextLevel();
}
}}
/>
))}

</div>

<p className="mt-6 font-bold">
Level {level+1} / {levels.length}
</p>

</GameLayout>
);

}

/* ---------------- TIC TAC TOE ---------------- */

function TicTacToe({reward,goBack}){

const [board,setBoard]=useState(Array(9).fill(null));
const [winner,setWinner]=useState(null);
const [mode,setMode]=useState(null);
const [xTurn,setXTurn]=useState(true);

const lines=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

const checkWinner=(b)=>{
for(let [a,b1,c] of lines){
if(b[a] && b[a]===b[b1] && b[a]===b[c]){
return b[a];
}
}
if(b.every(cell=>cell)) return "draw";
return null;
};

const aiMove=(newBoard)=>{
const empty=newBoard.map((v,i)=>v===null?i:null).filter(v=>v!==null);
if(empty.length===0) return;
const randomIndex=empty[Math.floor(Math.random()*empty.length)];
newBoard[randomIndex]="O";
};

const handleClick=(i)=>{
if(board[i] || winner) return;
let newBoard=[...board];

if(mode==="ai"){
newBoard[i]="X";
let result=checkWinner(newBoard);
if(!result){
aiMove(newBoard);
result=checkWinner(newBoard);
}
setBoard(newBoard);
if(result){
setWinner(result);
if(result==="X"){
setTimeout(()=>reward(20),800);
}
}
}
else if(mode==="2p"){
newBoard[i]=xTurn?"X":"O";
setBoard(newBoard);
setXTurn(!xTurn);
let result=checkWinner(newBoard);
if(result){
setWinner(result);
if(result!=="draw"){
setTimeout(()=>reward(20),800);
}
}
}
};

return(
<GameLayout title="Tic Tac Toe 🎮" onBack={goBack}>
{!mode && (
<div className="flex gap-4 mb-6">
<Button onClick={()=>setMode("ai")}>Play vs AI 🤖</Button>
<Button onClick={()=>setMode("2p")} className="bg-green-600">2 Player 👥</Button>
</div>
)}

{mode && (
<>
<div className="grid grid-cols-3 gap-2">
{board.map((val,i)=>(
<div
key={i}
onClick={()=>handleClick(i)}
className="w-20 h-20 bg-indigo-200 flex items-center justify-center text-3xl font-bold cursor-pointer hover:bg-indigo-300 transition">
{val}
</div>
))}
</div>

{winner==="draw" &&
<p className="mt-4 text-xl font-bold text-yellow-600">🤝 It's a Draw!</p>}

{winner && winner!=="draw" &&
<p className="mt-4 text-xl font-bold text-green-600 animate-bounce">
🏆 Winner: {winner}
</p>}

<Button className="mt-4"
onClick={()=>{
setBoard(Array(9).fill(null));
setWinner(null);
setXTurn(true);
}}>
Restart
</Button>

<Button className="mt-4 bg-red-500"
onClick={()=>{
setBoard(Array(9).fill(null));
setWinner(null);
setMode(null);
setXTurn(true);
}}>
Change Mode
</Button>
</>
)}
</GameLayout>
);
}

/* ---------------- ALPHABET GAME ---------------- */

/* ---------------- LEVEL ALPHABET GAME ---------------- */

function AlphabetGame({onBack,onWin}){

const levels=[
{target:"A",options:["A","B","C"]},
{target:"D",options:["D","E","F","A"]},
{target:"G",options:["H","G","J","K"]},
{target:"M",options:["M","N","O","P","Q"]},

if(letter===current.target){

return(

<GameLayout

<div className="flex flex-wrap gap-4 justify-center">

/* ---------------- MATH GAME ---------------- */

/* ---------------- LEVEL BASED MATH GAME ---------------- */

function MathGame({reward,goBack}){

const [level,setLevel]=useState(1);
const [question,setQuestion]=useState({});
const [answer,setAnswer]=useState('');
const [message,setMessage]=useState('');

function generateQuestion(lvl){

let num1,num2,operator,correct;

if(lvl<=3){
num1=Math.floor(Math.random()*10);
num2=Math.floor(Math.random()*10);
operator="+";
correct=num1+num2;
}
else if(lvl<=6){
num1=Math.floor(Math.random()*20);
num2=Math.floor(Math.random()*10);
operator="-";
correct=num1-num2;
}
else if(lvl<=9){
num1=Math.floor(Math.random()*10);
num2=Math.floor(Math.random()*10);
operator="×";
correct=num1*num2;
}
else{
num1=Math.floor(Math.random()*50);
num2=Math.floor(Math.random()*10)+1;
operator="÷";
correct=Math.floor(num1/num2);
}

setQuestion({num1,num2,operator,correct});
}

useEffect(()=>{
generateQuestion(level);
},[level]);

function checkAnswer(){

if(Number(answer)===question.correct){

setMessage("✅ Correct!");

if(level<10){
setTimeout(()=>{
setLevel(level+1);
setAnswer('');
setMessage('');
},1000);
}
else{
reward(30); // final reward
}

}else{
setMessage("❌ Try Again");
}
}

return(
<GameLayout title={`Math Level ${level}`} onBack={goBack}>

<h1 className="text-4xl font-bold mb-6">
{question.num1} {question.operator} {question.num2} = ?
</h1>

<input
className="border p-3 rounded-xl mb-4 text-center"
value={answer}
onChange={(e)=>setAnswer(e.target.value)}
/>

<Button onClick={checkAnswer}>Submit</Button>

<p className="mt-4 font-bold">{message}</p>

<p className="mt-6 text-gray-500">
Difficulty increases every level 🚀
</p>

</GameLayout>
);
}
/* ---------------- MEMORY MATCH ---------------- */

/* ---------------- LEVEL BASED MEMORY MATCH ---------------- */

function MemoryMatch({onBack,onWin}){

const allSymbols=[
"🍎","🍌","🍇","🍉","🍓","🍒",
"🐶","🐱","🐼","🐸","🦊","🐵",
"🚗","🚀","✈️","🚲","⚽","🏀"
];

const [level,setLevel]=React.useState(1);
const [cards,setCards]=React.useState([]);
const [open,setOpen]=React.useState([]);
const [matched,setMatched]=React.useState([]);

function setupLevel(lvl){

let pairCount;

if(lvl<=2) pairCount=2;      // 2x2
else if(lvl<=4) pairCount=4; // 4x2
else if(lvl<=6) pairCount=6; // 4x3
else pairCount=8;            // 4x4 HARD

const selected=allSymbols
.sort(()=>0.5-Math.random())
.slice(0,pairCount);

const deck=[...selected,...selected]
.sort(()=>0.5-Math.random());

setCards(deck);
setOpen([]);
setMatched([]);
}

React.useEffect(()=>{
setupLevel(level);
},[level]);

function clickCard(index){

if(open.length===2) return;
if(open.includes(index)) return;
if(matched.includes(index)) return;

const newOpen=[...open,index];
setOpen(newOpen);

if(newOpen.length===2){

if(cards[newOpen[0]]===cards[newOpen[1]]){

const newMatched=[
...matched,
newOpen[0],
newOpen[1]
];

setMatched(newMatched);

if(newMatched.length===cards.length){

setTimeout(()=>{

if(level<10){
setLevel(level+1);
}else{
onWin(25); // final reward
}

},700);
}
}

setTimeout(()=>setOpen([]),800);
}
}

const gridCols =
cards.length<=4 ? "grid-cols-2" :
cards.length<=8 ? "grid-cols-4" :
"grid-cols-4";

return(
<GameLayout title={`Memory Match Level ${level} 🧠`} onBack={onBack}>

<div className={`grid ${gridCols} gap-4`}>

{cards.map((card,i)=>(

<div
key={i}
onClick={()=>clickCard(i)}
className={`
w-20 h-20 text-3xl flex items-center justify-center
rounded-2xl cursor-pointer transition
${matched.includes(i)
? "bg-green-500 text-white"
: "bg-indigo-500 text-white hover:scale-110"}
`}
>

{open.includes(i) || matched.includes(i)
? card
: "?"}

</div>

))}

</div>

<p className="mt-6 font-bold text-gray-500">
Difficulty increases every level 🚀
</p>

</GameLayout>
);
}


/* ---------------- WORD GAME ---------------- */
/* ---------------- PRO WORD GAME ---------------- */

function WordGame({onBack,onWin}){

const levels=[
{word:"CAT",hint:"🐱 Animal"},
{word:"DOG",hint:"🐶 Pet"},
{word:"SUN",hint:"☀️ Sky"},
{word:"TREE",hint:"🌳 Nature"},
{word:"APPLE",hint:"🍎 Fruit"},
{word:"TIGER",hint:"🐯 Wild Animal"},
{word:"FLOWER",hint:"🌸 Plant"},
{word:"RAINBOW",hint:"🌈 Colors"}
];

const [level,setLevel]=React.useState(0);
const [selected,setSelected]=React.useState([]);

const current=levels[level];

const shuffledLetters=
[...current.word.split('')]
.sort(()=>Math.random()-0.5);

function addLetter(letter){
setSelected(s=>[...s,letter]);
}

function removeLetter(i){
setSelected(s=>s.filter((_,index)=>index!==i));
}

function checkAnswer(){

if(selected.join("")===current.word){

if(level < levels.length-1){
setLevel(level+1);
setSelected([]);
}
else{
onWin(40);
}
}
}

return(

<GameLayout
title={`Word Challenge Level ${level+1}`}
onBack={onBack}
>

{/* Progress Bar */}
<div className="w-64 bg-gray-200 rounded-full h-3 mb-6">
<div
className="bg-green-500 h-3 rounded-full"
style={{width:`${((level+1)/levels.length)*100}%`}}
></div>
</div>

<p className="font-bold mb-4">{current.hint}</p>

{/* Selected Word */}
<div className="flex gap-3 mb-6">
{selected.map((l,i)=>(
<div
key={i}
onClick={()=>removeLetter(i)}
className="w-12 h-12 bg-indigo-600 text-white flex items-center justify-center rounded-xl cursor-pointer"
>
{l}
</div>
))}
</div>

{/* Letter Options */}
<div className="flex gap-4 flex-wrap justify-center">
{shuffledLetters.map((l,i)=>(
<Button key={i} onClick={()=>addLetter(l)}>
{l}
</Button>
))}
</div>

<Button className="mt-6 bg-green-600" onClick={checkAnswer}>
Check Word
</Button>

<p className="mt-4 font-bold">
Difficulty: {level<3?"Easy":level<6?"Medium":"Hard"}
</p>

</GameLayout>
);
}

/* ---------------- NUMBERS GAME ---------------- */

/* ---------------- LEVEL NUMBERS GAME ---------------- */

function NumbersGame({onBack,onWin}){

const levels=[
{type:"smallest", nums:[1,5,9]},
{type:"largest", nums:[3,7,2]},
{type:"even", nums:[4,9,7]},
{type:"odd", nums:[8,5,2]},
{type:"smallest", nums:[12,18,25,6]},
{type:"largest", nums:[21,45,33,50]},
{type:"even", nums:[11,14,17,20]},
{type:"odd", nums:[30,41,22,18]}
];

const [level,setLevel]=React.useState(0);

const current=levels[level];

function correctNumber(){

if(current.type==="smallest") return Math.min(...current.nums);
if(current.type==="largest") return Math.max(...current.nums);
if(current.type==="even") return current.nums.find(n=>n%2===0);
if(current.type==="odd") return current.nums.find(n=>n%2!==0);
}

function select(num){

if(num===correctNumber()){

if(level < levels.length-1){
setLevel(level+1);
}
else{
onWin(30);
}

function TeamDecisionGame({onBack,onWin}){

const levels=[

{
question:"Your team must build a tower together.",
options:[
["Work together 🤝",true],
["Do everything alone ❌",false],
["Fight with team ❌",false]
]
},

{
question:"A friend drops their books.",
options:[
["Help them pick up 👍",true],
["Laugh at them ❌",false],
["Ignore and walk away ❌",false]
]
},

{
question:"Two friends want same toy.",
options:[
["Take turns 🧸",true],
["Snatch the toy ❌",false],
["Cry loudly ❌",false]
]
},

{
question:"Your teammate made a mistake.",
options:[
["Encourage them 💙",true],
["Blame them ❌",false],
["Leave team ❌",false]
]
},

{
question:"Group project deadline coming.",
options:[
["Divide work smartly 🧠",true],
["Do nothing ❌",false],
["Let others work ❌",false]
]
},

{
question:"New student joins class.",
options:[
["Welcome them 😊",true],
["Ignore them ❌",false],
["Make fun ❌",false]
]
}

];

const [level,setLevel]=React.useState(0);
const [feedback,setFeedback]=React.useState("");

const current=levels[level];

function choose(option){

if(option[1]){

setFeedback("Great Team Choice ✅");

setTimeout(()=>{

if(level<levels.length-1){
setLevel(level+1);
setFeedback("");
}else{
onWin(30); // Final reward
}

},1200);

}else{
setFeedback("Try better teamwork 🤔");
}
}

return(
<GameLayout
title={`Team Decision Level ${level+1} 🤝`}
onBack={onBack}
>

<div className="bg-blue-100 p-6 rounded-2xl mb-6 max-w-md">
{current.question}
</div>

<div className="flex flex-col gap-4">
{current.options.map((opt,i)=>(
<Button key={i} onClick={()=>choose(opt)}>
{opt[0]}
</Button>
))}
</div>

{feedback &&
<p className="mt-6 font-bold text-indigo-600">
{feedback}
</p>
}

<p className="mt-4 text-gray-500">
Difficulty increases every level 🚀
</p>

</GameLayout>
);
}
