<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroNest AI Kids Learning</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:'Nunito',sans-serif;}
.fade{animation:fade .5s ease;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.pop{animation:pop .3s ease;}
@keyframes pop{0%{transform:scale(.8)}100%{transform:scale(1)}}
</style>
</head>

<body class="bg-gradient-to-br from-indigo-100 to-pink-100">
<div id="root"></div>

<script type="text/babel">

const {useState,useEffect,useMemo} = React;

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_MSG_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ---------------- AI ENGINE ---------------- */

function aiEngine(stats){
  const {accuracy,speed} = stats;
  if(accuracy>0.85 && speed<2) return "hard";
  if(accuracy>0.6) return "medium";
  return "easy";
}

/* ---------------- UI ---------------- */

const Button=({children,onClick,className=""})=>(
<button onClick={onClick}
className={`px-6 py-3 rounded-2xl font-bold text-lg bg-indigo-600 text-white hover:bg-indigo-700 active:scale-95 transition pop ${className}`}>
{children}
</button>
);

/* ---------------- APP ---------------- */

function App(){

const [screen,setScreen]=useState("login");
const [user,setUser]=useState(null);
const [stars,setStars]=useState(0);
const [level,setLevel]=useState(1);
const [stats,setStats]=useState({accuracy:0.5,speed:3});
const [email,setEmail]=useState("");
const [pass,setPass]=useState("");
const [ans,setAns]=useState("");

const difficulty = useMemo(()=>aiEngine(stats),[stats]);

/* ---------- AUTH ---------- */

const login=async()=>{
 const res = await auth.signInWithEmailAndPassword(email,pass);
 setUser(res.user);
 const snap = await db.collection("users").doc(res.user.uid).get();
 if(snap.exists){
   const d=snap.data();
   setStars(d.stars||0);
   setLevel(d.level||1);
 }
 setScreen("dashboard");
};

const signup=async()=>{
 const res = await auth.createUserWithEmailAndPassword(email,pass);
 await db.collection("users").doc(res.user.uid).set({stars:0,level:1});
 setUser(res.user);
 setScreen("dashboard");
};

/* ---------- REWARD ---------- */

const reward=async(points)=>{
 setStars(s=>s+points);
 setLevel(l=>l+1);
 if(user){
   await db.collection("users").doc(user.uid).set({
     stars:stars+points,
     level:level+1
   },{merge:true});
 }
};

/* ---------- SCREENS ---------- */

if(screen==="login"){
return(
<div className="min-h-screen flex flex-col items-center justify-center gap-4 fade">
<h1 className="text-5xl font-black text-indigo-700">NeuroNest 🧠</h1>
<input onChange={e=>setEmail(e.target.value)} placeholder="Email" className="border p-3 rounded-xl"/>
<input type="password" onChange={e=>setPass(e.target.value)} placeholder="Password" className="border p-3 rounded-xl"/>
<Button onClick={login}>Login</Button>
<Button className="bg-pink-600" onClick={signup}>Signup</Button>
</div>
);
}

/* ---------- DASHBOARD ---------- */

if(screen==="dashboard"){
return(
<div className="p-6 fade">
<div className="flex justify-between items-center bg-white p-4 rounded-xl shadow">
<h2 className="font-black">⭐ {stars}</h2>
<h2>Level {level}</h2>
<span className="font-bold text-indigo-600">{difficulty.toUpperCase()}</span>
</div>

<h2 className="text-3xl font-black mt-6 mb-4">Games</h2>

<div className="grid grid-cols-2 gap-4">
<div onClick={()=>setScreen("math")} className="bg-green-200 p-6 rounded-2xl text-center font-bold cursor-pointer">Math</div>
<div onClick={()=>setScreen("memory")} className="bg-purple-200 p-6 rounded-2xl text-center font-bold cursor-pointer">Memory</div>
</div>
</div>
);
}

/* ---------- MATH ---------- */

if(screen==="math"){
const a = difficulty==="hard"? level*2 : level+1;
const b = difficulty==="easy"? 1 : level;
const correct = a+b;

return(
<div className="min-h-screen flex flex-col items-center justify-center fade">
<h1 className="text-5xl font-black mb-6">{a} + {b} = ?</h1>
<input value={ans} onChange={e=>setAns(e.target.value)} className="border p-3 rounded-xl mb-4"/>
<Button onClick={()=>{
 if(Number(ans)===correct){
   reward(10*level);
   setStats({accuracy:stats.accuracy+0.05,speed:stats.speed-0.2});
 }
 setAns("");
 setScreen("dashboard");
}}>Submit</Button>
</div>
);
}

/* ---------- MEMORY ---------- */

if(screen==="memory"){
const num = Math.floor(Math.random()*1000);

return(
<div className="min-h-screen flex flex-col items-center justify-center fade">
<h1 className="text-6xl font-black mb-6">{num}</h1>
<Button onClick={()=>{
 reward(15);
 setStats({accuracy:stats.accuracy+0.03,speed:stats.speed-0.1});
 setScreen("dashboard");
}}>Next</Button>
</div>
);
}

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
