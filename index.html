<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroNest - Kids Learning Platform</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { font-family: 'Nunito', sans-serif; }
</style>
</head>

<body class="bg-gradient-to-br from-indigo-100 to-pink-100">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useMemo } = React;
const MAX_LEVEL = 25;

/* ---------------- BUTTON ---------------- */

const Button = ({children,onClick,className=''})=>(
<button
onClick={onClick}
className={`px-6 py-3 rounded-2xl font-bold text-lg bg-indigo-600 text-white hover:bg-indigo-700 active:scale-95 transition ${className}`}
>
{children}
</button>
);

function App(){

const [screen,setScreen]=useState('welcome');
const [name,setName]=useState('');
const [age,setAge]=useState(null);
const [stars,setStars]=useState(0);
const [level,setLevel]=useState(1);
const [currentGame,setCurrentGame]=useState(null);

/* ---------- START GAME ---------- */

const startGame=(game)=>{
setCurrentGame(game);
setLevel(1);
setScreen(game);
};

/* ---------- REWARD ---------- */

const reward=(points)=>{
setStars(s=>s+points);

if(level < MAX_LEVEL){
setLevel(l=>l+1);
}else{
setLevel(1);
setScreen('dashboard');
}
};

/* ---------- HEADER ---------- */

const Header=()=>(
<div className="bg-white shadow p-4 flex justify-between sticky top-0 z-50">
<h2 className="font-black text-xl">⭐ Stars: {stars}</h2>
{screen !== 'dashboard' && screen !== 'welcome' && 
<span className="font-bold">Level {level} / {MAX_LEVEL}</span>}
</div>
);

/* ---------- WELCOME ---------- */

if(screen==='welcome'){
return(
<div className="min-h-screen flex flex-col items-center justify-center text-center">
<h1 className="text-5xl font-black mb-6 text-indigo-700">NeuroNest 🧠</h1>
<Button onClick={()=>setScreen('login')}>Start Learning</Button>
<Button className="mt-4 bg-pink-600" onClick={()=>setScreen('parent')}>Parent Mode</Button>
</div>
);
}

/* ---------- LOGIN ---------- */

if(screen==='login'){
return(
<div className="min-h-screen flex flex-col items-center justify-center">
<h2 className="text-3xl font-bold mb-6">Login</h2>
<input placeholder="Email" className="border p-3 rounded-xl mb-4"/>
<input placeholder="Password" type="password" className="border p-3 rounded-xl mb-4"/>
<Button onClick={()=>setScreen('name')}>Login</Button>
</div>
);
}

/* ---------- NAME ---------- */

if(screen==='name'){
return(
<div className="min-h-screen flex flex-col items-center justify-center">
<h2 className="text-3xl font-bold mb-6">Your Name?</h2>
<input value={name}
onChange={(e)=>setName(e.target.value)}
className="border p-3 rounded-xl mb-4"/>
<Button onClick={()=>setScreen('age')}>Next</Button>
</div>
);
}

/* ---------- AGE ---------- */

if(screen==='age'){
return(
<div className="min-h-screen flex flex-col items-center justify-center">
<h2 className="text-3xl font-bold mb-6">Select Age</h2>
<div className="flex gap-4 mb-6">
{[4,5,6,7,8,9].map(n=>(
<button key={n}
onClick={()=>setAge(n)}
className={`px-5 py-3 rounded-xl border ${age===n?'bg-indigo-600 text-white':''}`}>
{n}
</button>
))}
</div>
<Button onClick={()=>setScreen('dashboard')}>Continue</Button>
</div>
);
}

/* ---------- DASHBOARD ---------- */

if(screen==='dashboard'){
return(
<div>
<Header/>
<div className="p-8">
<h2 className="text-3xl font-black mb-6">Hi {name} 👋</h2>
<div className="grid grid-cols-2 md:grid-cols-4 gap-6">
{[
['Math','math','bg-green-200'],
['Alphabet','alphabet','bg-yellow-200'],
['Memory','memory','bg-purple-200'],
['Colors','colors','bg-red-200'],
['Numbers','numbers','bg-indigo-200'],
['Animals','animals','bg-teal-200'],
['Shapes','shapes','bg-pink-200'],
['Words','words','bg-orange-200']
].map(([title,key,color])=>(
<div key={key}
onClick={()=>startGame(key)}
className={`${color} p-6 rounded-3xl font-bold text-center cursor-pointer hover:scale-105 transition`}>
{title}
</div>
))}
</div>
</div>
</div>
);
}

/* ---------- GAME LAYOUT ---------- */

const GameLayout=({title,children})=>(
<div>
<Header/>
<div className="flex flex-col items-center justify-center p-10 text-center">
<h2 className="text-4xl font-black mb-6">{title}</h2>
{children}
<Button className="mt-8 bg-gray-500" onClick={()=>setScreen('dashboard')}>Back</Button>
</div>
</div>
);

/* ---------- MATH ---------- */

if(screen==='math'){
const a=level+2;
const b=level;
const correct=a+b;
const [ans,setAns]=useState('');
return(
<GameLayout title={`${a} + ${b} = ?`}>
<input className="border p-3 rounded-xl mb-4"
value={ans}
onChange={(e)=>setAns(e.target.value)} />
<Button onClick={()=>ans==correct && reward(10+level)}>Submit</Button>
</GameLayout>
);
}

/* ---------- ALPHABET ---------- */

if(screen==='alphabet'){
const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const safe=Math.min(level,26);
const target=letters[safe-1];
const options=letters.slice(0,safe+3).split('').sort(()=>0.5-Math.random());
return(
<GameLayout title={`Click ${target}`}>
<div className="flex flex-wrap gap-4 text-5xl font-black">
{options.map((l,i)=>(
<span key={i}
onClick={()=>l===target && reward(10+level)}
className="cursor-pointer">{l}</span>
))}
</div>
</GameLayout>
);
}

/* ---------- MEMORY ---------- */

if(screen==='memory'){
const digits=Math.min(2+Math.floor(level/3),8);
const number=useMemo(()=>Math.floor(Math.random()*Math.pow(10,digits)),[level]);
const [show,setShow]=useState(true);

useEffect(()=>{
setShow(true);
const delay=Math.max(1000,3000-level*60);
const t=setTimeout(()=>setShow(false),delay);
return()=>clearTimeout(t);
},[level]);

return(
<GameLayout title="Remember the Number">
{show?
<h1 className="text-6xl font-black">{number}</h1>
:
<Button onClick={()=>reward(15+level)}>Next</Button>}
</GameLayout>
);
}

/* ---------- COLORS (FIXED) ---------- */

if(screen==='colors'){
const colors=[
{name:'red',code:'#ef4444'},
{name:'blue',code:'#3b82f6'},
{name:'green',code:'#22c55e'},
{name:'yellow',code:'#eab308'},
{name:'purple',code:'#a855f7'}
];
const target=colors[level%colors.length];

return(
<GameLayout title={`Click ${target.name}`}>
<div className="flex gap-4">
{colors.map((c,i)=>(
<div key={i}
onClick={()=>c.name===target.name && reward(10+level)}
style={{backgroundColor:c.code}}
className="w-20 h-20 rounded-xl cursor-pointer border-4 border-white shadow-lg">
</div>
))}
</div>
</GameLayout>
);
}

/* ---------- NUMBERS ---------- */

if(screen==='numbers'){
const nums=useMemo(()=>[
Math.floor(Math.random()*level*5)+1,
Math.floor(Math.random()*level*5)+1,
Math.floor(Math.random()*level*5)+1
],[level]);

const smallest=Math.min(...nums);

return(
<GameLayout title="Click Smallest">
<div className="flex gap-6 text-4xl font-bold">
{nums.map((n,i)=>(
<span key={i}
onClick={()=>n===smallest && reward(10+level)}
className="cursor-pointer">{n}</span>
))}
</div>
</GameLayout>
);
}

/* ---------- ANIMALS ---------- */

if(screen==='animals'){
const animals=['Cat','Dog','Cow','Lion','Tiger'];
const target=animals[level%animals.length];
return(
<GameLayout title={`Click ${target}`}>
<div className="flex gap-4">
{animals.map((a,i)=>(
<Button key={i} onClick={()=>a===target && reward(10+level)}>{a}</Button>
))}
</div>
</GameLayout>
);
}

/* ---------- SHAPES ---------- */

if(screen==='shapes'){
return(
<GameLayout title="Click Circle">
<div className="flex gap-6">
<div onClick={()=>reward(10+level)} className="w-24 h-24 bg-indigo-500 rounded-full cursor-pointer"></div>
<div className="w-24 h-24 bg-indigo-500"></div>
</div>
</GameLayout>
);
}

/* ---------- WORDS ---------- */

if(screen==='words'){
const words=['CAT','DOG','SUN','MOON','STAR'];
const target=words[level%words.length];
return(
<GameLayout title={`Click ${target}`}>
<div className="flex gap-4">
{words.map((w,i)=>(
<Button key={i} onClick={()=>w===target && reward(15+level)}>{w}</Button>
))}
</div>
</GameLayout>
);
}

/* ---------- PARENT ---------- */

if(screen==='parent'){
return(
<div>
<Header/>
<div className="p-10 text-center">
<h2 className="text-3xl font-black mb-6">Parent Dashboard</h2>
<p className="text-xl">Total Stars Earned: {stars}</p>
<Button className="mt-6" onClick={()=>setScreen('welcome')}>Back</Button>
</div>
</div>
);
}

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
