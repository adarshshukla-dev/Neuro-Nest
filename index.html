<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroNest – Full EdTech Platform</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:'Nunito',sans-serif;}
.fade{animation:fade .4s ease;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.pop{animation:pop .2s ease;}
@keyframes pop{0%{transform:scale(.9)}100%{transform:scale(1)}}
</style>
</head>

<body class="bg-gradient-to-br from-indigo-100 to-pink-100">
<div id="root"></div>

<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>
<audio id="successSound" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3"></audio>

<script type="text/babel">

const {useState,useEffect,useMemo} = React;

/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_MSG_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ---------------- AI ENGINE ---------------- */
function aiEngine(stats){
 if(stats.accuracy>0.85 && stats.speed<2) return "hard";
 if(stats.accuracy>0.6) return "medium";
 return "easy";
}

/* ---------------- UI ---------------- */
const Button=({children,onClick,className=""})=>(
<button onClick={()=>{document.getElementById('clickSound').play();onClick();}}
className={`px-5 py-3 rounded-xl bg-indigo-600 text-white font-bold pop ${className}`}>
{children}
</button>
);

/* ---------------- APP ---------------- */
function App(){

const [screen,setScreen]=useState("login");
const [user,setUser]=useState(null);
const [email,setEmail]=useState("");
const [pass,setPass]=useState("");

const [stars,setStars]=useState(0);
const [level,setLevel]=useState(1);
const [xp,setXp]=useState(0);

const [stats,setStats]=useState({accuracy:0.5,speed:3});
const difficulty = useMemo(()=>aiEngine(stats),[stats]);

const [childrenProfiles,setChildrenProfiles]=useState([{name:"Kid 1"}]);
const [activeChild,setActiveChild]=useState(0);

const playSuccess=()=>document.getElementById('successSound').play();

/* -------- AUTH -------- */
const login=async()=>{
 const res = await auth.signInWithEmailAndPassword(email,pass);
 setUser(res.user);
 const snap = await db.collection("users").doc(res.user.uid).get();
 if(snap.exists){
  const d=snap.data();
  setStars(d.stars||0); setLevel(d.level||1); setXp(d.xp||0);
 }
 setScreen("dashboard");
};

const signup=async()=>{
 const res = await auth.createUserWithEmailAndPassword(email,pass);
 await db.collection("users").doc(res.user.uid).set({stars:0,level:1,xp:0});
 setUser(res.user);
 setScreen("dashboard");
};

/* -------- REWARD -------- */
const reward=async(points)=>{
 playSuccess();
 setStars(s=>s+points);
 setXp(x=>x+points*2);
 if(xp>100){ setLevel(l=>l+1); setXp(0); }
 if(user){
  await db.collection("users").doc(user.uid).set({
   stars:stars+points,
   level:level,
   xp:xp
  },{merge:true});
 }
};

/* ---------------- SCREENS ---------------- */

if(screen==="login"){
return(
<div className="min-h-screen flex flex-col items-center justify-center gap-4 fade">
<h1 className="text-5xl font-black text-indigo-700">NeuroNest 🧠</h1>
<input onChange={e=>setEmail(e.target.value)} placeholder="Email" className="border p-3 rounded-xl"/>
<input type="password" onChange={e=>setPass(e.target.value)} placeholder="Password" className="border p-3 rounded-xl"/>
<Button onClick={login}>Login</Button>
<Button className="bg-pink-600" onClick={signup}>Signup</Button>
</div>
);
}

/* ---------------- DASHBOARD ---------------- */
if(screen==="dashboard"){
return(
<div className="p-6 fade">
<div className="flex justify-between bg-white p-4 rounded-xl shadow">
<span>⭐ {stars}</span>
<span>Level {level}</span>
<span className="text-indigo-600 font-bold">{difficulty}</span>
</div>

<div className="grid grid-cols-2 gap-3 mt-4">
<Button onClick={()=>setScreen("games")}>🎮 Games</Button>
<Button onClick={()=>setScreen("parent")}>👨‍👩‍👧 Parent</Button>
<Button onClick={()=>setScreen("leaderboard")}>🏆 Leaderboard</Button>
<Button onClick={()=>setScreen("admin")}>🛡 Admin</Button>
</div>
</div>
);
}

/* ---------------- GAMES HUB ---------------- */
if(screen==="games"){
const games=["Math","Memory","Alphabet","Colors","Numbers","Animals","Shapes","Words","Speed","Logic"];
return(
<div className="p-6 fade">
<h2 className="text-3xl font-black mb-4">Games</h2>
<div className="grid grid-cols-2 gap-4">
{games.map(g=>(
<div key={g} onClick={()=>setScreen(g.toLowerCase())}
className="bg-indigo-200 p-5 rounded-xl text-center font-bold cursor-pointer">{g}</div>
))}
</div>
<Button className="mt-6 bg-gray-500" onClick={()=>setScreen("dashboard")}>Back</Button>
</div>
);
}

/* ---------------- SAMPLE GAMES ---------------- */

if(screen==="math"){
const a=level+1,b=level;
const [ans,setAns]=useState("");
return(
<div className="min-h-screen flex flex-col items-center justify-center fade">
<h1 className="text-5xl">{a}+{b}</h1>
<input value={ans} onChange={e=>setAns(e.target.value)} className="border p-3 mt-4"/>
<Button onClick={()=>{ if(Number(ans)===a+b){ reward(10); setStats({accuracy:stats.accuracy+0.05,speed:stats.speed-0.2}); } setScreen("games");}}>Submit</Button>
</div>
);
}

if(screen==="memory"){
const num=Math.floor(Math.random()*1000);
return(
<div className="min-h-screen flex flex-col items-center justify-center fade">
<h1 className="text-6xl">{num}</h1>
<Button onClick={()=>{reward(15); setScreen("games");}}>Next</Button>
</div>
);
}

/* ---------------- PARENT MODE ---------------- */
if(screen==="parent"){
return(
<div className="p-6 fade">
<h2 className="text-3xl font-black mb-4">Parent Dashboard</h2>
<p>Child: {childrenProfiles[activeChild].name}</p>
<p>Stars: {stars}</p>
<p>Level: {level}</p>
<p>XP: {xp}</p>

<h3 className="font-bold mt-4">Children Profiles</h3>
{childrenProfiles.map((c,i)=>(
<div key={i} onClick={()=>setActiveChild(i)} className="p-2 bg-white rounded mt-2 cursor-pointer">
{c.name}
</div>
))}

<Button className="mt-4" onClick={()=>setScreen("dashboard")}>Back</Button>
</div>
);
}

/* ---------------- LEADERBOARD ---------------- */
if(screen==="leaderboard"){
return(
<div className="p-6 fade">
<h2 className="text-3xl font-black mb-4">Leaderboard</h2>
<ol className="list-decimal ml-6">
<li>Kid Alpha - 500⭐</li>
<li>Kid Beta - 420⭐</li>
<li>Kid Gamma - 380⭐</li>
</ol>
<Button className="mt-4" onClick={()=>setScreen("dashboard")}>Back</Button>
</div>
);
}

/* ---------------- ADMIN PANEL ---------------- */
if(screen==="admin"){
return(
<div className="p-6 fade">
<h2 className="text-3xl font-black mb-4">Admin Panel</h2>
<ul className="list-disc ml-6">
<li>User Management</li>
<li>Content Control</li>
<li>AI Tuning</li>
<li>Analytics</li>
<li>Revenue Dashboard</li>
<li>Feature Toggles</li>
</ul>
<Button className="mt-4" onClick={()=>setScreen("dashboard")}>Back</Button>
</div>
);
}

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

<!-- PWA BASE -->
<link rel="manifest" href="manifest.json">
<script>
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
