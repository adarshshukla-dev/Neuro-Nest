<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroNest - Kids Desktop & Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap');
        body { 
            font-family: 'Nunito', sans-serif; 
            background: radial-gradient(circle at center, #eef2ff 0%, #e2e8f0 100%);
            overflow-x: hidden;
        }
        /* Desktop Mockup Styling */
        @media (min-width: 768px) {
            .app-container {
                height: 850px;
                width: 400px;
                border: 12px solid #1e293b;
                border-radius: 3rem;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                position: relative;
            }
            .app-container::after {
                content: '';
                position: absolute;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                width: 60px;
                height: 5px;
                background: #334155;
                border-radius: 10px;
            }
        }
        .animate-breathe { animation: breathe 4s ease-in-out infinite; }
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
            const variants = {
                primary: 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg active:scale-95',
                secondary: 'bg-pink-500 text-white hover:bg-pink-600 shadow-md',
                outline: 'border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50'
            };
            return (
                <button disabled={disabled} onClick={onClick} className={`px-6 py-4 rounded-2xl font-black transition-all flex items-center justify-center gap-2 ${variants[variant]} ${disabled ? 'opacity-50' : ''} ${className}`}>
                    {children}
                </button>
            );
        };

        function App() {
            const [screen, setScreen] = useState('splash');
            const [stars, setStars] = useState(120);
            const [profile, setProfile] = useState({ name: '', age: '' });

            useEffect(() => {
                if (screen === 'splash') setTimeout(() => setScreen('welcome'), 2000);
            }, [screen]);

            const renderScreen = () => {
                switch (screen) {
                    case 'splash': return (
                        <div className="flex-1 flex flex-col items-center justify-center bg-indigo-600 text-white rounded-[inherit]">
                            <Icon name="brain" className="w-20 h-20 mb-4 animate-bounce" />
                            <h1 className="text-4xl font-black italic">NeuroNest</h1>
                        </div>
                    );
                    case 'welcome': return (
                        <div className="flex-1 flex flex-col p-8 justify-between bg-white rounded-[inherit]">
                            <div className="text-center mt-12">
                                <Icon name="brain" className="w-20 h-20 text-indigo-600 mx-auto mb-6" />
                                <h2 className="text-3xl font-black text-slate-900">NeuroNest</h2>
                                <p className="text-slate-500 mt-2">Smart play for kids.</p>
                            </div>
                            <div className="space-y-4">
                                <Button onClick={() => setScreen('profile')} className="w-full">Let's Play!</Button>
                                <Button onClick={() => setScreen('parent')} variant="outline" className="w-full text-sm">Parent Mode</Button>
                            </div>
                        </div>
                    );
                    case 'profile': return (
                        <div className="flex-1 p-8 flex flex-col bg-white rounded-[inherit]">
                            <h2 className="text-2xl font-black mb-6">Hello! What's your name?</h2>
                            <input type="text" className="w-full p-4 rounded-2xl border-4 border-indigo-50 focus:border-indigo-500 outline-none mb-4" placeholder="Enter name..." value={profile.name} onChange={e => setProfile({...profile, name: e.target.value})} />
                            <Button className="mt-auto" disabled={!profile.name} onClick={() => setScreen('dashboard')}>Start!</Button>
                        </div>
                    );
                    case 'dashboard': return (
                        <div className="flex-1 bg-slate-50 flex flex-col rounded-[inherit] overflow-hidden">
                            <div className="bg-white p-6 flex justify-between items-center shadow-sm">
                                <span className="font-black text-indigo-600 text-xl">NeuroNest</span>
                                <div className="bg-amber-100 px-3 py-1 rounded-full flex items-center gap-1 font-bold text-amber-700">
                                    <Icon name="star" className="w-4 h-4 fill-amber-500" /> {stars}
                                </div>
                            </div>
                            <div className="p-6 grid grid-cols-1 gap-4 overflow-y-auto">
                                <div onClick={() => setScreen('game-brain')} className="bg-blue-500 p-6 rounded-3xl text-white flex items-center justify-between cursor-pointer hover:scale-105 transition-transform">
                                    <div><p className="font-black text-xl">Brain Puzzle</p><p className="text-blue-100 text-sm">Training focus</p></div>
                                    <Icon name="zap" className="w-10 h-10" />
                                </div>
                                <div onClick={() => setScreen('game-focus')} className="bg-teal-500 p-6 rounded-3xl text-white flex items-center justify-between cursor-pointer hover:scale-105 transition-transform">
                                    <div><p className="font-black text-xl">Calm Breath</p><p className="text-teal-100 text-sm">Relax time</p></div>
                                    <Icon name="wind" className="w-10 h-10" />
                                </div>
                            </div>
                        </div>
                    );
                    case 'game-brain': return (
                        <div className="flex-1 bg-white p-8 flex flex-col items-center justify-center rounded-[inherit]">
                            <h2 className="text-2xl font-black mb-8 text-center">Tap the <span className="text-indigo-600">Indigo</span> Square!</h2>
                            <div className="grid grid-cols-2 gap-4 w-full">
                                <div onClick={() => {setStars(s=>s+20); setScreen('dashboard')}} className="bg-indigo-600 aspect-square rounded-3xl cursor-pointer active:scale-90 transition-all shadow-xl"></div>
                                <div className="bg-slate-200 aspect-square rounded-3xl"></div>
                                <div className="bg-slate-200 aspect-square rounded-3xl"></div>
                                <div className="bg-slate-200 aspect-square rounded-3xl"></div>
                            </div>
                            <Button variant="outline" onClick={() => setScreen('dashboard')} className="mt-12 w-full">Back</Button>
                        </div>
                    );
                    case 'game-focus': return (
                        <div className="flex-1 bg-teal-50 p-8 flex flex-col items-center justify-center rounded-[inherit]">
                            <div className="w-48 h-48 bg-teal-500 rounded-full animate-breathe flex items-center justify-center shadow-2xl mb-12">
                                <Icon name="wind" className="w-16 h-16 text-white" />
                            </div>
                            <h2 className="text-3xl font-black text-teal-800">Breathe...</h2>
                            <Button onClick={() => setScreen('dashboard')} className="mt-12 w-full bg-teal-600">Done</Button>
                        </div>
                    );
                    case 'parent': return (
                        <div className="flex-1 bg-white p-6 rounded-[inherit]">
                            <button onClick={() => setScreen('welcome')} className="mb-6 flex items-center gap-2 font-bold text-slate-500"><Icon name="arrow-left"/> Back</button>
                            <h2 className="text-2xl font-black mb-6">Parent Dashboard</h2>
                            <div className="space-y-4">
                                <div className="p-4 bg-slate-50 rounded-2xl border-2 border-slate-100">
                                    <p className="text-xs font-bold text-slate-400">DAILY USAGE</p>
                                    <p className="text-2xl font-black">24 Minutes</p>
                                </div>
                                <div className="p-4 bg-indigo-50 rounded-2xl border-2 border-indigo-100">
                                    <p className="text-xs font-bold text-indigo-400">SKILL FOCUS</p>
                                    <p className="text-xl font-black text-indigo-700">Logical Reasoning</p>
                                </div>
                            </div>
                        </div>
                    );
                }
            };

            return (
                <div className="app-container bg-white flex flex-col w-full h-full md:h-[850px] md:w-[400px]">
                    {renderScreen()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
